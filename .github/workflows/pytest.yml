name: Test all the files of solid_cinel

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        test_target:
          - core/
          - application/test_scinel.py

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.12'
          cache: 'pip'

      - name: install solid_cinel
        run: bash install.sh

      - name: pytest solid_cinel code core
        if: matrix.test_target == 'core/'
        run: pytest --cov=solid_cinel solid_cinel/core/

      - name: pytest solid_cinel code applications
        if: matrix.test_target == 'application/test_scinel.py'
        run: python -m unittest solid_cinel/application/test_scinel.py

  core_tests_on_windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.12'
          cache: 'pip'

      - name: install solid_cinel
        run: bash install.sh
      - name: pytest solid_cinel code core
        run: pytest --cov=solid_cinel solid_cinel/core/