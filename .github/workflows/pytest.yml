# .github/workflows/app.yaml
name: Test all the files of solid_cinel

on:
  # Triggers the workflow on push or pull request events but only for the develop branch
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.1.0-base-ubi8

    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.12'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: install general python dependencies
        run: pip install sphinx sphinx_rtd_theme numpydoc coveralls pytest-cov nbval
      - name: install solid cinel requirements
        run: pip install -r requirements.txt
      - name: install solid_cinel
        run: python -m pip install . --user
      - name: pytest solid_cinel code core
        run: pytest --cov=solid_cinel solid_cinel/core/
