name: Check the tests folder

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the develop branch
  schedule:
  #        ┌───────────── minute (0 - 59)
  #        │  ┌───────────── hour (0 - 23)
  #        │  │ ┌───────────── day of the month (1 - 31)
  #        │  │ │ ┌───────────── month (1 - 12 or JAN-DEC)
  #        │  │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
  #        │  │ │ │ │
  - cron: '0 12 * * 1,3,5'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build:
    name: Big Test checkout
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3
        with:
          # The branch, tag or SHA to checkout. When checking out the repository that
          # triggered a workflow, this defaults to the reference or SHA for that event.
          # Otherwise, defaults to `master`.
          ref: 'develop'
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.12'
          cache: 'pip'

      # Run commands using the runners shell
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: install general python dependencies
        run: pip install sphinx sphinx_rtd_theme numpydoc coveralls pytest-cov nbval
      - name: install solid cinel requirements
        run: pip install -r requirements.txt
      - name: install solid_cinel
        run: python -m pip install . --user
      - name: Test materials
        run: pytest --cov=solid_cinel solid_cinel/tests/materials/
      - name: Big test for the whole solid_cinel code
        run: pytest --cov=solid_cinel solid_cinel/tests/solid_cinel/
